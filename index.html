<!DOCTYPE html>
<html>
<head>
    <title>Calorie Burned Calculator</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="number"], select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calorie Calculator</h2>
        <form action="calculate" method="post">
            <div class="form-group">
                <label for="exercise">Exercise Type:</label>
                <select id="exercise" name="exercise">
                    <option value="running">Running (10 cal/min)</option>
                    <option value="cycling">Cycling (8 cal/min)</option>
                    <option value="swimming">Swimming (11 cal/min)</option>
                    <option value="walking">Walking (4 cal/min)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="duration">Duration (minutes):</label>
                <input type="number" id="duration" name="duration" required min="1">
            </div>
            <button type="submit">Calculate</button>
        </form>
    </div>
</body>

</html>
